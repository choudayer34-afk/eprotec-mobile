<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>Bilan</title>
<script>
(function generateBilanIcon() {
  const canvas = document.createElement('canvas');
  canvas.width = 180; canvas.height = 180;
  const ctx = canvas.getContext('2d');
  const r = 40;

  ctx.fillStyle = '#0B2A5C';
  ctx.beginPath();
  ctx.moveTo(r, 0);
  ctx.arcTo(180, 0, 180, 180, r);
  ctx.arcTo(180, 180, 0, 180, r);
  ctx.arcTo(0, 180, 0, 0, r);
  ctx.arcTo(0, 0, 180, 0, r);
  ctx.closePath();
  ctx.fill();

  const cx = 90, cy = 100;

  ctx.strokeStyle = '#F5821F';
  ctx.lineWidth = 6;
  ctx.lineCap = 'round';
  for (let i = 0; i < 8; i++) {
    const angle = (Math.PI * 2 / 8) * i;
    const x1 = cx + Math.cos(angle) * 58;
    const y1 = cy + Math.sin(angle) * 58 - 10;
    const x2 = cx + Math.cos(angle) * 78;
    const y2 = cy + Math.sin(angle) * 78 - 10;
    ctx.beginPath();
    ctx.moveTo(x1, y1);
    ctx.lineTo(x2, y2);
    ctx.stroke();
  }

  ctx.fillStyle = '#F5821F';
  ctx.beginPath();
  ctx.moveTo(58, 108);
  ctx.lineTo(122, 108);
  ctx.lineTo(114, 122);
  ctx.lineTo(66, 122);
  ctx.closePath();
  ctx.fill();

  ctx.beginPath();
  ctx.ellipse(90, 88, 32, 26, 0, Math.PI, 2 * Math.PI);
  ctx.fill();

  ctx.fillStyle = '#FFFFFF';
  ctx.globalAlpha = 0.55;
  ctx.beginPath();
  ctx.ellipse(78, 78, 10, 7, -0.4, 0, 2 * Math.PI);
  ctx.fill();
  ctx.globalAlpha = 1;

  const dataUrl = canvas.toDataURL('image/png');
  const touchIcon = document.createElement('link');
  touchIcon.rel = 'apple-touch-icon';
  touchIcon.href = dataUrl;
  document.head.appendChild(touchIcon);
  const favicon = document.createElement('link');
  favicon.rel = 'icon';
  favicon.href = dataUrl;
  document.head.appendChild(favicon);
})();
</script>
<style>
  html, body { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #0B2A5C; }
  iframe { width: 100%; height: 100%; border: none; display: block; }
</style>
</head>
<body>
<iframe src="index.html#bilan"></iframe>
</body>
</html>
