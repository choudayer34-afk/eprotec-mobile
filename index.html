<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>eProtec Mobile</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, "Segoe UI", sans-serif;
    background: #0E1E3A;
    color: #fff;
    padding-bottom: 90px;
  }
  header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 16px; position: sticky; top: 0; background: #0E1E3A; z-index: 5;
  }
  header h1 { font-size: 16px; font-weight: 500; }
  main { padding: 0 14px; }
  .kpi-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 14px; }
  .kpi { background: #16274A; border-radius: 12px; padding: 12px; cursor: pointer; }
  .kpi .value { color: #F5821F; font-size: 22px; font-weight: 500; }
  .kpi .label { color: #9FB3D6; font-size: 11px; margin-top: 2px; }
  .card {
    background: #16274A; border-radius: 14px; padding: 12px; margin-bottom: 10px;
  }
  .card.highlight { border: 1.5px solid #F5821F; }
  .card-title { font-size: 13px; font-weight: 500; margin-bottom: 6px; }
  .event-row {
    padding: 8px 0; border-top: 0.5px solid #223258;
    display: flex; justify-content: space-between; align-items: flex-start; gap: 8px;
  }
  .event-row:first-child { border-top: none; }
  .event-title { font-size: 13px; }
  .event-meta { color: #9FB3D6; font-size: 11px; margin-top: 3px; }
  .badge {
    font-size: 10px; padding: 3px 9px; border-radius: 20px; white-space: nowrap;
  }
  .badge-new { background: #3A2A0E; color: #FAC775; }
  .badge-ok { background: #12351F; color: #97C459; }
  .badge-blue { background: #1B2A4A; color: #85B7EB; }
  .badge-suggest { background: #223258; color: #F5821F; }
  .empty { color: #9FB3D6; font-size: 12px; padding: 8px 0; }
  .star-btn {
    background: none; border: none; font-size: 17px; color: #5F5E5A;
    padding: 2px 4px; line-height: 1;
  }
  .star-btn.active { color: #F5821F; }
  .card-header-row { display: flex; justify-content: space-between; align-items: flex-start; gap: 8px; }
  .cal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
  .cal-header button { background: #16274A; border: none; color: #fff; font-size: 16px; padding: 6px 14px; border-radius: 10px; }
  .cal-header .cal-title { font-size: 14px; font-weight: 500; }
  .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; margin-bottom: 12px; }
  .cal-daylabel { text-align: center; font-size: 10px; color: #9FB3D6; padding-bottom: 4px; }
  .cal-cell { background: #16274A; border-radius: 8px; padding: 4px 2px; min-height: 40px; text-align: center; }
  .cal-cell.empty { background: transparent; }
  .cal-cell.today { border: 1px solid #F5821F; }
  .cal-cell.selected { background: #223258; }
  .cal-cell .cal-daynum { font-size: 11px; color: #fff; }
  .cal-dots { display: flex; justify-content: center; gap: 2px; margin-top: 2px; flex-wrap: wrap; }
  .cal-dot { width: 5px; height: 5px; border-radius: 50%; }
  .cal-dot-outline { background: transparent !important; border: 1.5px solid; box-sizing: border-box; }
  .cal-legend { display: flex; flex-wrap: wrap; gap: 8px; margin: 4px 0 14px; }
  .cal-legend-item { display: flex; align-items: center; gap: 4px; font-size: 10px; color: #9FB3D6; }
  .month-group { margin-bottom: 12px; }
  .month-toggle {
    width: 100%; background: #16274A; border: none; color: #fff;
    display: flex; justify-content: space-between; align-items: center;
    padding: 12px 14px; border-radius: 12px; font-size: 13px; font-weight: 500;
  }
  .month-chevron { color: #F5821F; font-size: 12px; }
  .month-body { padding-top: 8px; }
  .insc-section-title { font-size: 11px; color: #9FB3D6; margin: 14px 0 6px; text-transform: uppercase; letter-spacing: 0.5px; }

  .sub-nav { display: flex; gap: 6px; margin-bottom: 14px; overflow-x: auto; }
  .sub-nav button {
    background: #16274A; color: #9FB3D6; border: none; font-size: 12px;
    padding: 8px 14px; border-radius: 20px; white-space: nowrap;
  }
  .sub-nav button.active { background: #F5821F; color: #4A1B0C; }
  .sub-section { display: none; }
  .sub-section.active { display: block; }

  .link-card {
    display: flex; align-items: center; gap: 12px;
    background: #16274A; border-radius: 14px; padding: 14px; margin-bottom: 10px;
    text-decoration: none; color: #fff;
  }
  .link-card .link-icon { font-size: 22px; }
  .link-card .link-title { font-size: 13px; font-weight: 500; }

  nav {
    position: fixed; bottom: 0; left: 0; right: 0;
    background: #16274A; display: flex; justify-content: space-around;
    padding: 10px 4px calc(10px + env(safe-area-inset-bottom));
  }
  nav button {
    background: none; border: none; color: #9FB3D6;
    font-size: 11px; display: flex; flex-direction: column; align-items: center; gap: 3px;
    padding: 4px 6px;
  }
  nav button .nav-icon { font-size: 18px; }
  nav button.active { color: #F5821F; }
  section { display: none; }
  section.active { display: block; }
</style>
</head>
<body>

<header><h1>eProtec Mobile</h1></header>

<main>

  <section id="accueil" class="active">
    <div class="kpi-grid">
      <div class="kpi"><div class="value" id="kpi-nouveautes">-</div><div class="label">Nouveautés</div></div>
      <div class="kpi"><div class="value" id="kpi-inscrits">-</div><div class="label">Déjà inscrits</div></div>
    </div>

    <div class="card">
      <div class="card-title">Dernières nouveautés</div>
      <div id="liste-nouveautes"><div class="empty">Chargement...</div></div>
    </div>

    <div class="card">
      <div class="card-title">📅 Mes inscriptions (15 prochains jours)</div>
      <div id="liste-inscriptions-proches"><div class="empty">Chargement...</div></div>
    </div>

    <div class="card highlight">
      <div class="card-title">🎯 Suggestion du mois</div>
      <div id="top-suggestion"><div class="empty">Chargement...</div></div>
    </div>
  </section>

  <section id="evenements">
    <div id="liste-evenements"><div class="empty">Chargement...</div></div>
  </section>

  <section id="calendrier"></section>

  <section id="favoris">
    <div id="liste-favoris"><div class="empty">Chargement...</div></div>
  </section>

  <section id="plus">
 <div class="sub-nav">
      <button data-sub="plus-suggestions" class="active">Suggestions</button>
      <button data-sub="plus-inscriptions">Inscriptions</button>
      <button data-sub="plus-nouveautes">Nouveautés</button>
      <button data-sub="plus-liens">Liens utiles</button>
    </div>

    <div id="plus-suggestions" class="sub-section active">
      <div id="liste-suggestions"><div class="empty">Chargement...</div></div>
    </div>

    <div id="plus-inscriptions" class="sub-section">
      <div id="liste-inscriptions-globales"><div class="empty">Chargement...</div></div>
    </div>

    <div id="plus-nouveautes" class="sub-section">
      <div id="liste-nouveautes-completes"><div class="empty">Chargement...</div></div>
    </div>
    <div id="plus-liens" class="sub-section">
      <a class="link-card" href="https://academy.protection-civile-herault.org/" target="_blank">
        <span class="link-icon">📘</span><span class="link-title">Formation</span>
      </a>
      <a class="link-card" href="https://drive.google.com/drive/folders/1SuSx23UacBrhPFYWF1W1R7Y6Pq2YK93_" target="_blank">
        <span class="link-icon">☁️</span><span class="link-title">Cloud Formation</span>
      </a>
      <a class="link-card" href="https://cloud.protection-civile-herault.org/index.php/apps/dashboard/" target="_blank">
        <span class="link-icon">📷</span><span class="link-title">Photo</span>
      </a>
      <a class="link-card" href="https://eprotec.protection-civile.org" target="_blank">
        <span class="link-icon">🚑</span><span class="link-title">eProtec</span>
      </a>
      <a class="link-card" href="https://boutique.protection-civile.org/fr/" target="_blank">
        <span class="link-icon">🛒</span><span class="link-title">Boutique</span>
      </a>
    </div>
  </section>

</main>

<nav>
  <button data-tab="accueil" class="active"><span class="nav-icon">🏠</span>Accueil</button>
  <button data-tab="evenements"><span class="nav-icon">📋</span>Événements</button>
  <button data-tab="calendrier"><span class="nav-icon">🗓️</span>Calendrier</button>
  <button data-tab="favoris"><span class="nav-icon">⭐</span>Favoris</button>
  <button data-tab="plus"><span class="nav-icon">⋯</span>Plus</button>
</nav>

<script>
const FAVORIS_KEY = 'eprotec_favoris';

function getFavoris() {
  try {
    return JSON.parse(localStorage.getItem(FAVORIS_KEY) || '[]');
  } catch {
    return [];
  }
}

function isFavori(uid) {
  return getFavoris().includes(uid);
}

function toggleFavori(uid) {
  const favoris = getFavoris();
  const idx = favoris.indexOf(uid);
  if (idx >= 0) favoris.splice(idx, 1);
  else favoris.push(uid);
  localStorage.setItem(FAVORIS_KEY, JSON.stringify(favoris));
}

function formatDate(iso) {
  if (!iso) return 'date inconnue';
  const d = new Date(iso);
  return d.toLocaleString('fr-FR', { weekday: 'short', day: '2-digit', month: '2-digit', hour: '2-digit', minute: '2-digit' });
}

async function importFavorisOnce() {
  if (localStorage.getItem(FAVORIS_KEY) !== null) return;
  try {
    const seed = await fetch('data/favoris-seed.json').then(r => r.json());
    localStorage.setItem(FAVORIS_KEY, JSON.stringify(seed));
    console.log(`${seed.length} anciens favoris importés.`);
  } catch {
    localStorage.setItem(FAVORIS_KEY, JSON.stringify([]));
  }
}
importFavorisOnce();

document.querySelectorAll('nav button').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('section').forEach(s => s.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById(btn.dataset.tab).classList.add('active');
    if (btn.dataset.tab === 'favoris') renderFavoris();
    if (btn.dataset.tab === 'calendrier') renderCalendar();
    if (btn.dataset.tab === 'plus') { renderInscriptions(); renderSuggestions(allSuggestions); }
  });
});

document.querySelectorAll('.sub-nav button').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.sub-nav button').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.sub-section').forEach(s => s.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById(btn.dataset.sub).classList.add('active');
  });
});

let allEvents = [];
let allSuggestions = [];

const TAG_COLORS = {
  DPS: '#F5821F', FOR: '#378ADD', MAN: '#D85A30',
  MLA: '#7F77DD', ALERT: '#E24B4A', AIP: '#639922',
  BENEVOLE: '#1D9E75', AUTRE: '#888780'
};

let calMonth = new Date(new Date().getFullYear(), new Date().getMonth(), 1);
let calSelectedKey = null;

function dateKey(d) {
  return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0');
}

function renderCalendar() {
  const container = document.getElementById('calendrier');
  if (!container) return;

  const monthLabel = calMonth.toLocaleDateString('fr-FR', { month: 'long', year: 'numeric' });
  const eventsByDay = {};
  allEvents.forEach(e => {
    if (!e.dateDebut) return;
    const d = new Date(e.dateDebut);
    const key = dateKey(d);
    (eventsByDay[key] ||= []).push(e);
  });

  const suggestionsByDay = {};
  allSuggestions.forEach(s => {
    if (!s.dateDebut) return;
    const key = dateKey(new Date(s.dateDebut));
    (suggestionsByDay[key] ||= []).push(s);
  });

  const firstOfMonth = new Date(calMonth.getFullYear(), calMonth.getMonth(), 1);
  const startWeekday = (firstOfMonth.getDay() + 6) % 7;
  const daysInMonth = new Date(calMonth.getFullYear(), calMonth.getMonth() + 1, 0).getDate();
  const todayKey = dateKey(new Date());

  let cells = '';
  for (let i = 0; i < startWeekday; i++) cells += '<div class="cal-cell empty"></div>';
  for (let day = 1; day <= daysInMonth; day++) {
    const d = new Date(calMonth.getFullYear(), calMonth.getMonth(), day);
    const key = dateKey(d);
    const dayEvents = eventsByDay[key] || [];
    const daySuggestions = suggestionsByDay[key] || [];
    const tags = [...new Set(dayEvents.map(e => e.tag))].slice(0, 4);
    const eventDots = tags.map(t => `<span class="cal-dot" style="background:${TAG_COLORS[t] || '#888780'}"></span>`).join('');
    const suggestDot = daySuggestions.length > 0
      ? `<span class="cal-dot cal-dot-outline" style="border-color:${TAG_COLORS.DPS}"></span>`
      : '';
    const dots = eventDots + suggestDot;
    const classes = ['cal-cell'];
    if (key === todayKey) classes.push('today');
    if (key === calSelectedKey) classes.push('selected');
    cells += `<div class="${classes.join(' ')}" data-day-key="${key}">
      <div class="cal-daynum">${day}</div>
      <div class="cal-dots">${dots}</div>
    </div>`;
  }

  const dayLabels = ['Lun','Mar','Mer','Jeu','Ven','Sam','Dim'].map(l => `<div class="cal-daylabel">${l}</div>`).join('');

  container.innerHTML = `
    <div class="cal-header">
      <button id="cal-prev">‹</button>
      <span class="cal-title">${monthLabel}</span>
      <button id="cal-next">›</button>
    </div>
    <div class="cal-grid">${dayLabels}${cells}</div>
    <div class="cal-legend">
      ${Object.entries(TAG_COLORS).map(([tag, color]) => `
        <span class="cal-legend-item"><span class="cal-dot" style="background:${color}"></span>${tag}</span>
      `).join('')}
      <span class="cal-legend-item"><span class="cal-dot cal-dot-outline" style="border-color:${TAG_COLORS.DPS}"></span>Suggestion</span>
    </div>
    <div id="cal-day-detail"></div>
  `;

  document.getElementById('cal-prev').addEventListener('click', () => {
    calMonth = new Date(calMonth.getFullYear(), calMonth.getMonth() - 1, 1);
    renderCalendar();
  });
  document.getElementById('cal-next').addEventListener('click', () => {
    calMonth = new Date(calMonth.getFullYear(), calMonth.getMonth() + 1, 1);
    renderCalendar();
  });

  container.querySelectorAll('[data-day-key]').forEach(cell => {
    cell.addEventListener('click', () => {
      calSelectedKey = cell.dataset.dayKey;
      renderCalendar();
      renderDayDetail(calSelectedKey, eventsByDay[calSelectedKey] || [], suggestionsByDay[calSelectedKey] || []);
    });
  });

  if (calSelectedKey) renderDayDetail(calSelectedKey, eventsByDay[calSelectedKey] || [], suggestionsByDay[calSelectedKey] || []);
}

function renderDayDetail(key, events, suggestions = []) {
  const detail = document.getElementById('cal-day-detail');
  if (!detail) return;
  const dateLabel = new Date(key).toLocaleDateString('fr-FR', { weekday: 'long', day: '2-digit', month: 'long' });

  if (events.length === 0 && suggestions.length === 0) {
    detail.innerHTML = `<div class="card"><div class="card-title">${dateLabel}</div><div class="empty">Aucune activité ce jour.</div></div>`;
    return;
  }

  let html = `<div class="card-title" style="margin:10px 0 6px;">${dateLabel}</div>`;
  html += events.map(e => eventCard(e)).join('');

  suggestions.forEach(s => {
    html += `
      <div class="card" data-url="${s.url || ''}">
        <div class="card-header-row">
          <div>
            <div class="event-title">[DPS] ${s.titre}</div>
            <div class="event-meta">${formatDate(s.dateDebut)} · ${s.lieu || ''}</div>
          </div>
        </div>
        <div style="margin-top:8px;"><span class="badge badge-suggest">🎯 Suggéré (score ${s.score})</span></div>
      </div>
    `;
  });

  detail.innerHTML = html;
  attachStarHandlers(detail);
  attachCardLinkHandlers(detail);
}

function eventCard(e) {
  let badge = '';
  if (e.dejaInscrit) badge = '<span class="badge badge-blue">Déjà inscrit</span>';
  else if (e.nouveau) badge = '<span class="badge badge-new">Nouveau</span>';

  const starActive = isFavori(e.uid) ? 'active' : '';
  const starIcon = isFavori(e.uid) ? '★' : '☆';

  return `
    <div class="card" data-uid="${e.uid}" data-url="${e.url || ''}">
      <div class="card-header-row">
        <div>
          <div class="event-title">[${e.tag}] ${e.titre}</div>
          <div class="event-meta">${formatDate(e.dateDebut)} · ${e.lieu || ''}</div>
        </div>
        <button class="star-btn ${starActive}" data-fav-uid="${e.uid}">${starIcon}</button>
      </div>
      <div style="margin-top:8px;">${badge}</div>
    </div>
  `;
}

function attachCardLinkHandlers(container) {
  container.querySelectorAll('[data-url]').forEach(card => {
    const url = card.dataset.url;
    if (!url) return;
    card.style.cursor = 'pointer';
    card.addEventListener('click', (e) => {
      if (e.target.closest('.star-btn')) return;
      window.open(url, '_blank');
    });
  });
}

function attachStarHandlers(container, removeOnUnfav = false) {
  container.querySelectorAll('[data-fav-uid]').forEach(btn => {
    btn.addEventListener('click', (evt) => {
      evt.stopPropagation();
      toggleFavori(btn.dataset.favUid);
      const active = isFavori(btn.dataset.favUid);
      btn.classList.toggle('active', active);
      btn.textContent = active ? '★' : '☆';
      if (removeOnUnfav && !active) {
        const card = btn.closest('.card');
        if (card) card.remove();
      }
    });
  });
}

function renderFavoris() {
  const favUids = getFavoris();
  const favEvents = allEvents
    .filter(e => favUids.includes(e.uid) && e.dateDebut)
    .sort((a, b) => new Date(a.dateDebut) - new Date(b.dateDebut));

  const container = document.getElementById('liste-favoris');
  if (favEvents.length === 0) {
    container.innerHTML = '<div class="empty">Aucun favori pour le moment. Appuie sur l\'étoile d\'un événement pour l\'ajouter.</div>';
    return;
  }

  const groups = {};
  favEvents.forEach(e => {
    const d = new Date(e.dateDebut);
    const key = d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0');
    (groups[key] ||= []).push(e);
  });

  container.innerHTML = Object.keys(groups).sort().map(key => {
    const label = new Date(key + '-01').toLocaleDateString('fr-FR', { month: 'long', year: 'numeric' });
    return `
      <div class="month-group">
        <button class="month-toggle" data-month-key="${key}">
          <span>${label.charAt(0).toUpperCase() + label.slice(1)} (${groups[key].length})</span>
          <span class="month-chevron">▾</span>
        </button>
        <div class="month-body" data-month-body="${key}" style="display:block">
          ${groups[key].map(e => eventCard(e)).join('')}
        </div>
      </div>
    `;
  }).join('');

  container.querySelectorAll('.month-toggle').forEach(btn => {
    btn.addEventListener('click', () => {
      const body = container.querySelector(`[data-month-body="${btn.dataset.monthKey}"]`);
      const chevron = btn.querySelector('.month-chevron');
      const isHidden = body.style.display === 'none';
      body.style.display = isHidden ? 'block' : 'none';
      chevron.textContent = isHidden ? '▾' : '▸';
    });
  });

  attachStarHandlers(container, true);
  attachCardLinkHandlers(container);
}

function renderUpcomingRegistrations(events) {
  const now = new Date();
  const limit = new Date(now.getTime() + 15 * 24 * 3600 * 1000);
  const upcoming = events
    .filter(e => e.dejaInscrit && e.dateDebut && new Date(e.dateDebut) >= now && new Date(e.dateDebut) <= limit)
    .sort((a, b) => new Date(a.dateDebut) - new Date(b.dateDebut));

  const container = document.getElementById('liste-inscriptions-proches');
  container.innerHTML = upcoming.length === 0
    ? '<div class="empty">Aucune inscription dans les 15 prochains jours.</div>'
    : upcoming.map(e => `
      <div class="event-row" data-url="${e.url || ''}">
        <div>
          <div class="event-title">[${e.tag}] ${e.titre}</div>
          <div class="event-meta">${formatDate(e.dateDebut)} · ${e.lieu || ''}</div>
        </div>
        <span class="badge badge-blue">Inscrit</span>
      </div>
    `).join('');
  attachCardLinkHandlers(container);
}

function renderInscriptions() {
  const registered = allEvents
    .filter(e => e.dejaInscrit && e.dateDebut)
    .sort((a, b) => new Date(a.dateDebut) - new Date(b.dateDebut));

  const container = document.getElementById('liste-inscriptions-globales');
  if (registered.length === 0) {
    container.innerHTML = '<div class="empty">Aucune inscription à venir.</div>';
    return;
  }

  const groups = {};
  registered.forEach(e => {
    const d = new Date(e.dateDebut);
    const key = d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0');
    (groups[key] ||= []).push(e);
  });

  container.innerHTML = Object.keys(groups).sort().map(key => {
    const label = new Date(key + '-01').toLocaleDateString('fr-FR', { month: 'long', year: 'numeric' });
    return `
      <div class="month-group">
        <button class="month-toggle" data-month-key="${key}">
          <span>${label.charAt(0).toUpperCase() + label.slice(1)} (${groups[key].length})</span>
          <span class="month-chevron">▾</span>
        </button>
        <div class="month-body" data-month-body="${key}" style="display:block">
          ${groups[key].map(e => eventCard(e)).join('')}
        </div>
      </div>
    `;
  }).join('');

  container.querySelectorAll('.month-toggle').forEach(btn => {
    btn.addEventListener('click', () => {
      const body = container.querySelector(`[data-month-body="${btn.dataset.monthKey}"]`);
      const chevron = btn.querySelector('.month-chevron');
      const isHidden = body.style.display === 'none';
      body.style.display = isHidden ? 'block' : 'none';
      chevron.textContent = isHidden ? '▾' : '▸';
    });
  });

  attachStarHandlers(container);
  attachCardLinkHandlers(container);
}

function groupSuggestionsByMonth(suggestions) {
  const groups = {};
  suggestions.forEach(s => {
    if (!s.dateDebut) return;
    const d = new Date(s.dateDebut);
    const key = d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0');
    (groups[key] ||= []).push(s);
  });
  return Object.keys(groups).sort().map(key => ({
    key,
    label: new Date(key + '-01').toLocaleDateString('fr-FR', { month: 'long', year: 'numeric' }),
    items: groups[key].sort((a, b) => b.score - a.score)
  }));
}

function renderSuggestions(suggestions) {
  const container = document.getElementById('liste-suggestions');
  const monthGroups = groupSuggestionsByMonth(suggestions);

  if (monthGroups.length === 0) {
    container.innerHTML = '<div class="empty">Aucune suggestion disponible.</div>';
    return;
  }

  container.innerHTML = monthGroups.map((g) => `
    <div class="month-group">
      <button class="month-toggle" data-month-key="${g.key}">
        <span>${g.label.charAt(0).toUpperCase() + g.label.slice(1)} (${g.items.length})</span>
        <span class="month-chevron">▾</span>
      </button>
      <div class="month-body" data-month-body="${g.key}" style="display:block">
        ${g.items.map((s, i) => `
          <div class="card ${i === 0 ? 'highlight' : ''}" data-url="${s.url || ''}">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:6px;">
              <span class="badge ${i === 0 ? 'badge-new' : 'badge-ok'}">${i === 0 ? 'Prioritaire' : 'Score ' + s.score}</span>
              ${i === 0 ? `<span style="color:#F5821F; font-weight:500;">${s.score} pts</span>` : ''}
            </div>
            <div class="event-title">[DPS] ${s.titre}</div>
            <div class="event-meta">${formatDate(s.dateDebut)} · ${s.lieu || ''}</div>
          </div>
        `).join('')}
      </div>
    </div>
  `).join('');

  container.querySelectorAll('.month-toggle').forEach(btn => {
    btn.addEventListener('click', () => {
      const body = container.querySelector(`[data-month-body="${btn.dataset.monthKey}"]`);
      const chevron = btn.querySelector('.month-chevron');
      const isHidden = body.style.display === 'none';
      body.style.display = isHidden ? 'block' : 'none';
      chevron.textContent = isHidden ? '▾' : '▸';
    });
  });

  attachCardLinkHandlers(container);
}

function renderNouveautes(events) {
  const nouveautes = events
    .filter(e => e.nouveau && e.dateDebut)
    .sort((a, b) => new Date(a.dateDebut) - new Date(b.dateDebut));

  const container = document.getElementById('liste-nouveautes-completes');
  container.innerHTML = nouveautes.length === 0
    ? '<div class="empty">Aucune nouveauté pour le moment.</div>'
    : nouveautes.map(e => eventCard(e)).join('');
  attachStarHandlers(container);
  attachCardLinkHandlers(container);
}

function goToPlusSub(subId) {
  document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('section').forEach(s => s.classList.remove('active'));
  document.querySelector('nav button[data-tab="plus"]').classList.add('active');
  document.getElementById('plus').classList.add('active');

  document.querySelectorAll('.sub-nav button').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.sub-section').forEach(s => s.classList.remove('active'));
  document.querySelector(`.sub-nav button[data-sub="${subId}"]`).classList.add('active');
  document.getElementById(subId).classList.add('active');

  renderInscriptions();
  renderSuggestions(allSuggestions);
  renderNouveautes(allEvents);
}

document.getElementById('kpi-inscrits').closest('.kpi').addEventListener('click', () => goToPlusSub('plus-inscriptions'));
document.getElementById('kpi-nouveautes').closest('.kpi').addEventListener('click', () => goToPlusSub('plus-nouveautes'));

async function loadData() {
  const [events, suggestions] = await Promise.all([
    fetch('data/events.json').then(r => r.json()),
    fetch('data/suggestions.json').then(r => r.json())
  ]);

  allEvents = events;
  allSuggestions = suggestions;

  const nouveautes = events.filter(e => e.nouveau);
  const inscrits = events.filter(e => e.dejaInscrit);

  document.getElementById('kpi-nouveautes').textContent = nouveautes.length;
  document.getElementById('kpi-inscrits').textContent = inscrits.length;

  renderUpcomingRegistrations(events);

  const listeNouveautes = document.getElementById('liste-nouveautes');
  listeNouveautes.innerHTML = nouveautes.length === 0
    ? '<div class="empty">Aucune nouveauté pour le moment.</div>'
    : nouveautes.slice(0, 5).map(e => `
      <div class="event-row" data-url="${e.url || ''}">
        <div>
          <div class="event-title">[${e.tag}] ${e.titre}</div>
          <div class="event-meta">${formatDate(e.dateDebut)} · ${e.lieu || ''}</div>
        </div>
        <span class="badge badge-new">Nouveau</span>
      </div>
    `).join('');
  attachCardLinkHandlers(listeNouveautes);

  const topSuggestion = document.getElementById('top-suggestion');
  if (suggestions.length === 0) {
    topSuggestion.innerHTML = '<div class="empty">Aucune suggestion disponible.</div>';
  } else {
    const s = suggestions[0];
    topSuggestion.innerHTML = `
      <div class="event-title">[DPS] ${s.titre}</div>
      <div class="event-meta">${formatDate(s.dateDebut)} · ${s.lieu || ''}</div>
      <div style="margin-top:8px; display:flex; gap:6px; flex-wrap:wrap;">
        <span class="badge badge-ok">Score ${s.score}</span>
      </div>
    `;
    if (s.url) {
      topSuggestion.style.cursor = 'pointer';
      topSuggestion.addEventListener('click', () => window.open(s.url, '_blank'));
    }
  }

const listeEvenements = document.getElementById('liste-evenements');
  listeEvenements.innerHTML = events.slice(0, 40).map(e => eventCard(e)).join('');
  attachStarHandlers(listeEvenements);
  attachCardLinkHandlers(listeEvenements);

  renderNouveautes(events);
}

loadData().catch(err => {
  document.querySelectorAll('.empty').forEach(el => el.textContent = 'Erreur de chargement des données.');
  console.error(err);
});
</script>
