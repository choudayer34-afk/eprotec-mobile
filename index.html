<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>eProtec Mobile</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, "Segoe UI", sans-serif;
    background: #0E1E3A;
    color: #fff;
    padding-bottom: 80px;
  }
  header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 16px; position: sticky; top: 0; background: #0E1E3A; z-index: 5;
  }
  header h1 { font-size: 16px; font-weight: 500; }
  main { padding: 0 14px; }
  .kpi-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 14px; }
  .kpi { background: #16274A; border-radius: 12px; padding: 12px; }
  .kpi .value { color: #F5821F; font-size: 22px; font-weight: 500; }
  .kpi .label { color: #9FB3D6; font-size: 11px; margin-top: 2px; }
  .card {
    background: #16274A; border-radius: 14px; padding: 12px; margin-bottom: 10px;
  }
  .card.highlight { border: 1.5px solid #F5821F; }
  .card-title { font-size: 13px; font-weight: 500; margin-bottom: 6px; }
  .event-row {
    padding: 8px 0; border-top: 0.5px solid #223258;
    display: flex; justify-content: space-between; align-items: flex-start; gap: 8px;
  }
  .event-row:first-child { border-top: none; }
  .event-title { font-size: 13px; }
  .event-meta { color: #9FB3D6; font-size: 11px; margin-top: 3px; }
  .badge {
    font-size: 10px; padding: 3px 9px; border-radius: 20px; white-space: nowrap;
  }
  .badge-new { background: #3A2A0E; color: #FAC775; }
  .badge-ok { background: #12351F; color: #97C459; }
  .badge-blue { background: #1B2A4A; color: #85B7EB; }
  .empty { color: #9FB3D6; font-size: 12px; padding: 8px 0; }
  .star-btn {
    background: none; border: none; font-size: 17px; color: #5F5E5A;
    padding: 2px 4px; line-height: 1;
  }
  .star-btn.active { color: #F5821F; }
  .card-header-row { display: flex; justify-content: space-between; align-items: flex-start; gap: 8px; }
  nav {
    position: fixed; bottom: 0; left: 0; right: 0;
    background: #16274A; display: flex; justify-content: space-around;
    padding: 10px 4px calc(10px + env(safe-area-inset-bottom));
  }
  nav button {
    background: none; border: none; color: #9FB3D6;
    font-size: 9px; display: flex; flex-direction: column; align-items: center; gap: 2px;
  }
  nav button.active { color: #F5821F; }
  section { display: none; }
  section.active { display: block; }
</style>
</head>
<body>

<header><h1>eProtec Mobile</h1></header>

<main>

  <section id="accueil" class="active">
    <div class="kpi-grid">
      <div class="kpi"><div class="value" id="kpi-nouveautes">-</div><div class="label">Nouveautés</div></div>
      <div class="kpi"><div class="value" id="kpi-inscrits">-</div><div class="label">Déjà inscrits</div></div>
    </div>

    <div class="card">
      <div class="card-title">Dernières nouveautés</div>
      <div id="liste-nouveautes"><div class="empty">Chargement...</div></div>
    </div>

    <div class="card highlight">
      <div class="card-title">🎯 Suggestion du mois</div>
      <div id="top-suggestion"><div class="empty">Chargement...</div></div>
    </div>
  </section>

  <section id="evenements">
    <div id="liste-evenements"><div class="empty">Chargement...</div></div>
  </section>

  <section id="suggestions">
    <div id="liste-suggestions"><div class="empty">Chargement...</div></div>
  </section>

  <section id="favoris">
    <div id="liste-favoris"><div class="empty">Chargement...</div></div>
  </section>

</main>

<nav>
  <button data-tab="accueil" class="active">Accueil</button>
  <button data-tab="evenements">Événements</button>
  <button data-tab="suggestions">Suggestions</button>
  <button data-tab="favoris">Favoris</button>
</nav>

<script>
const FAVORIS_KEY = 'eprotec_favoris';

function getFavoris() {
  try {
    return JSON.parse(localStorage.getItem(FAVORIS_KEY) || '[]');
  } catch {
    return [];
  }
}

function isFavori(uid) {
  return getFavoris().includes(uid);
}

function toggleFavori(uid) {
  const favoris = getFavoris();
  const idx = favoris.indexOf(uid);
  if (idx >= 0) favoris.splice(idx, 1);
  else favoris.push(uid);
  localStorage.setItem(FAVORIS_KEY, JSON.stringify(favoris));
}

function formatDate(iso) {
  if (!iso) return 'date inconnue';
  const d = new Date(iso);
  return d.toLocaleString('fr-FR', { weekday: 'short', day: '2-digit', month: '2-digit', hour: '2-digit', minute: '2-digit' });
}

 async function importFavorisOnce() {
  if (localStorage.getItem(FAVORIS_KEY) !== null) return;
  try {
    const seed = await fetch('data/favoris-seed.json').then(r => r.json());
    localStorage.setItem(FAVORIS_KEY, JSON.stringify(seed));
    console.log(`${seed.length} anciens favoris importés.`);
  } catch {
    localStorage.setItem(FAVORIS_KEY, JSON.stringify([]));
  }
}
importFavorisOnce();
 
document.querySelectorAll('nav button').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('section').forEach(s => s.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById(btn.dataset.tab).classList.add('active');
    if (btn.dataset.tab === 'favoris') renderFavoris();
  });
});

let allEvents = [];

function eventCard(e, opts = {}) {
  let badge = '';
  if (e.dejaInscrit) badge = '<span class="badge badge-blue">Déjà inscrit</span>';
  else if (e.nouveau) badge = '<span class="badge badge-new">Nouveau</span>';

  const starActive = isFavori(e.uid) ? 'active' : '';
  const starIcon = isFavori(e.uid) ? '★' : '☆';

  return `
    <div class="card" data-uid="${e.uid}">
      <div class="card-header-row">
        <div>
          <div class="event-title">[${e.tag}] ${e.titre}</div>
          <div class="event-meta">${formatDate(e.dateDebut)} · ${e.lieu || ''}</div>
        </div>
        <button class="star-btn ${starActive}" data-fav-uid="${e.uid}">${starIcon}</button>
      </div>
      <div style="margin-top:8px;">${badge}</div>
    </div>
  `;
}

function attachStarHandlers(container) {
  container.querySelectorAll('[data-fav-uid]').forEach(btn => {
    btn.addEventListener('click', () => {
      toggleFavori(btn.dataset.favUid);
      const active = isFavori(btn.dataset.favUid);
      btn.classList.toggle('active', active);
      btn.textContent = active ? '★' : '☆';
    });
  });
}

function renderFavoris() {
  const favUids = getFavoris();
  const favEvents = allEvents.filter(e => favUids.includes(e.uid));
  const container = document.getElementById('liste-favoris');
  container.innerHTML = favEvents.length === 0
    ? '<div class="empty">Aucun favori pour le moment. Appuie sur l\'étoile d\'un événement pour l\'ajouter.</div>'
    : favEvents.map(e => eventCard(e)).join('');
  attachStarHandlers(container);
}

async function loadData() {
  const [events, suggestions] = await Promise.all([
    fetch('data/events.json').then(r => r.json()),
    fetch('data/suggestions.json').then(r => r.json())
  ]);

  allEvents = events;

  const nouveautes = events.filter(e => e.nouveau);
  const inscrits = events.filter(e => e.dejaInscrit);

  document.getElementById('kpi-nouveautes').textContent = nouveautes.length;
  document.getElementById('kpi-inscrits').textContent = inscrits.length;

  const listeNouveautes = document.getElementById('liste-nouveautes');
  listeNouveautes.innerHTML = nouveautes.length === 0
    ? '<div class="empty">Aucune nouveauté pour le moment.</div>'
    : nouveautes.slice(0, 5).map(e => `
      <div class="event-row">
        <div>
          <div class="event-title">[${e.tag}] ${e.titre}</div>
          <div class="event-meta">${formatDate(e.dateDebut)} · ${e.lieu || ''}</div>
        </div>
        <span class="badge badge-new">Nouveau</span>
      </div>
    `).join('');

  const topSuggestion = document.getElementById('top-suggestion');
  if (suggestions.length === 0) {
    topSuggestion.innerHTML = '<div class="empty">Aucune suggestion disponible.</div>';
  } else {
    const s = suggestions[0];
    topSuggestion.innerHTML = `
      <div class="event-title">[DPS] ${s.titre}</div>
      <div class="event-meta">${formatDate(s.dateDebut)} · ${s.lieu || ''}</div>
      <div style="margin-top:8px; display:flex; gap:6px; flex-wrap:wrap;">
        <span class="badge badge-ok">Score ${s.score}</span>
      </div>
    `;
  }

  const listeEvenements = document.getElementById('liste-evenements');
  listeEvenements.innerHTML = events.slice(0, 40).map(e => eventCard(e)).join('');
  attachStarHandlers(listeEvenements);

  const listeSuggestions = document.getElementById('liste-suggestions');
  listeSuggestions.innerHTML = suggestions.map((s, i) => `
    <div class="card ${i === 0 ? 'highlight' : ''}">
      <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:6px;">
        <span class="badge ${i === 0 ? 'badge-new' : 'badge-ok'}">${i === 0 ? 'Prioritaire' : 'Score ' + s.score}</span>
        ${i === 0 ? `<span style="color:#F5821F; font-weight:500;">${s.score} pts</span>` : ''}
      </div>
      <div class="event-title">[DPS] ${s.titre}</div>
      <div class="event-meta">${formatDate(s.dateDebut)} · ${s.lieu || ''}</div>
    </div>
  `).join('');
}

loadData().catch(err => {
  document.querySelectorAll('.empty').forEach(el => el.textContent = 'Erreur de chargement des données.');
  console.error(err);
});
</script>

</body>
</html>
